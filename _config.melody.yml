# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Toomaatooo's Blog
subtitle: 'Welcome to my blog!'
description: 'toomaatooo blog'
keywords: blog,reading notes
author: ZhangNort
language: en
timezone: 'Asia/Beijing'

# 工具栏
menu:
  🍅Blog: /
  🌕Archives: /archives
  🍐Tags: /tags
  🍑Categories: /categories

# 文章自动节选
auto_excerpt:
  enable: true
  length: 150

# 颜色配置
theme_color:
  enable: true # or false -> to use the default theme
  main: "#D6204D"
  paginator: "#870D2C"
  button_hover: "#D6204D"
  text_selection: "#45252D"
  link_color: "#D6204D"
  hr_color: "#D6204D"
  meta_color: "#181D31"
  header_text_color: "#181D31" # v1.7.0+
  footer_text_color: "#181D31" # v1.7.0+



  
# 代码高亮
highlight_theme: pale night # default/darker/pale night/light
code_word_wrap: true

#社交图标配置
social:
  github fab: https://github.com/toomaatooo
  quora fab: https://www.quora.com/profile/Zhang-North-1

cdn:
  css:
    fontawesome: https://cdn.jsdelivr.net/npm/font-awesome@latest/css/font-awesome.min.css
    fontawesomev5: https://use.fontawesome.com/releases/v5.7.2/css/all.css

# 顶部图

top_img: https://raw.githubusercontent.com/toomaatooo/toomaatooo.github.io/main/2023/09/06/argchengyun/mountain.jpg



# 底部协议
post_copyright:
  enable: true
  license: CC BY-NC-SA 4.0 # 协议名称
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/ # 协议说明地址

# 侧边栏
sidebar_display: post # all/index/post/index-none/post-none/hidden

# 头像
avatar: https://img2.woyaogexing.com/2020/03/18/a665a2dd37c041e694bd62322446827e!400x400.jpeg

# 目录
toc:
  enable: true # or false
  number: true # or false. 版本v1.5.6新增
  
# 博客年份
since: 2022

# 底部箴言
footer_custom_text: Hi, welcome to my <a href="https://toomaatooo.github.io">blog</a>!

# 特效
fireworks: false

canvas_ribbon:
  enable: false
  size: 150
  alpha: 0.6
  zIndex: -1
  click_to_change: false

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: http://example.com
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: melody

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: 'git'
  repository: https://github.com/toomaatooo/toomaatooo.github.io.git
  branch: main